# Evolution API em DESENVOLVIMENTO — gateway WhatsApp (API não-oficial, protocolo
# WhatsApp Web) do agente MAG (ver docs/subsistemas/02b-agente-whatsapp-n8n.md).
# Precisa de Postgres próprio (Evolution não suporta SQLite/MySQL) + Redis
# (cache de sessão/conexão, recomendado pela doc oficial) — containers
# dedicados, nada reaproveitado do resto da plataforma. Sobe junto com o dev
# via:
#   ../init-dev.sh --evolution
# ou sozinho:
#   docker compose -f docker-compose.dev.yml up -d
#
# Manager (UI de instâncias/QR code): http://localhost:8080/manager
#   Header "apikey" nas chamadas REST = AUTHENTICATION_API_KEY abaixo (fixa e
#   pública só porque é dev — NUNCA reaproveitar essa chave em produção).
# Pra chamar o Django dev (runserver no host), use http://host.docker.internal:8000/...
# Pra chamar o n8n dev (outro compose), use http://n8n:5678/... — os dois
# entram na mesma rede externa (magma-dev-net, criada pelo init-dev.sh),
# porque host.docker.internal NÃO alcança o n8n dev (porta publicada só em
# 127.0.0.1, o gateway da bridge não tem acesso a isso).

services:
  evolution-postgres:
    image: postgres:15
    container_name: magma-evolution-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: evolution
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution-dev
    volumes:
      - evolution_postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "evolution"]
      interval: 5s
      timeout: 5s
      retries: 20

  evolution-redis:
    image: redis:7-alpine
    container_name: magma-evolution-redis-dev
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - evolution_redis_dev_data:/data

  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: magma-evolution-api-dev
    restart: unless-stopped
    depends_on:
      evolution-postgres:
        condition: service_healthy
      evolution-redis:
        condition: service_started
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      SERVER_URL: http://localhost:8080
      AUTHENTICATION_API_KEY: dev-evolution-key-troque-em-prod
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution-dev@evolution-postgres:5432/evolution?schema=evolution_api
      DATABASE_CONNECTION_CLIENT_NAME: magma_evolution_dev
      DATABASE_SAVE_DATA_INSTANCE: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://evolution-redis:6379/6
      CACHE_REDIS_SAVE_INSTANCES: "false"
      CACHE_LOCAL_ENABLED: "false"
      DEL_INSTANCE: "false"
      LANGUAGE: pt-BR
      CONFIG_SESSION_PHONE_CLIENT: Magma Cursos (dev)
      LOG_LEVEL: ERROR,WARN,INFO
    volumes:
      - evolution_instances_dev:/evolution/instances
    extra_hosts:
      # Permite o container enxergar o Django dev e o n8n dev rodando no host.
      - "host.docker.internal:host-gateway"
    healthcheck:
      # Primeiro boot aplica ~60 migrations no Postgres antes de responder —
      # start_period maior evita falso-negativo nesse boot inicial mais lento.
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080 >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  evolution_postgres_dev_data:
  evolution_redis_dev_data:
  evolution_instances_dev:

networks:
  default:
    name: magma-dev-net
    external: true
