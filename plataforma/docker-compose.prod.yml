# Ambiente de produção (containers). Suba com o script ../plataforma/init-prod.sh
# ou manualmente:
#   docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build
#
# Único ponto de entrada é o nginx na porta 80 — funciona tanto acessando
# http://<EXTERNAL_IP>/ quanto http://<DOMAIN>/ (e depois https://<DOMAIN>/
# quando você configurar TLS). backend/frontend não ficam expostos direto.

services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env.prod
    environment:
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}
      DB_HOST: db
      DB_PORT: "3306"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_MEDIA_HOST: ${NEXT_PUBLIC_MEDIA_HOST}
        NEXT_PUBLIC_NOANIM: ${NEXT_PUBLIC_NOANIM:-}
    restart: unless-stopped
    env_file: .env.prod
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      # - "443:443"  # habilite quando configurar TLS (ex.: certbot)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/usr/share/nginx/static:ro
      - media_volume:/usr/share/nginx/media:ro
    depends_on:
      - backend
      - frontend

volumes:
  mysql_data:
  static_volume:
  media_volume:
