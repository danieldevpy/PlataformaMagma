# ===========================================================================
# Config de REFERÊNCIA do nginx do HOST (não é container).
#
# O nginx roda direto na VPS, termina o TLS (Let's Encrypt) e faz proxy pros
# containers publicados no loopback pelo docker-compose.prod.yml:
#   /api e /dj-admin  -> 127.0.0.1:8000  (Django/gunicorn)
#   /static/ /media/  -> servidos direto do disco (mais rápido que passar pelo app)
#   resto             -> 127.0.0.1:3000  (Next.js)
#
# COMO USAR:
#   1. Troque /CAMINHO/ABSOLUTO/DO/PROJETO pelo caminho real onde este repo
#      está clonado na VPS (ex.: /opt/magmacursos). Os dois alias precisam
#      apontar pra plataforma/staticfiles e plataforma/media — as MESMAS
#      pastas montadas como volume no compose (é ali que o collectstatic e os
#      uploads caem no host).
#   2. Garanta que o usuário do nginx (www-data) consegue LER essas pastas:
#        sudo chmod o+X /CAMINHO/ABSOLUTO/DO/PROJETO /.../plataforma /.../staticfiles /.../media
#      (execução/travessia nos diretórios; os arquivos já saem legíveis).
#   3. Copie pra /etc/nginx/sites-available/magmacursos e habilite:
#        sudo ln -s /etc/nginx/sites-available/magmacursos /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx
#   4. Emita o certificado (uma vez):  sudo certbot --nginx -d magmacursosltda.com.br
#      (o certbot cria/ajusta os blocos ssl_* e o redirect 80->443 sozinho.)
# ===========================================================================

server {
    server_name magmacursosltda.com.br;
    client_max_body_size 20m;

    # Ganho de banda em HTML/JS/CSS/JSON (imagens já vêm comprimidas).
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml image/svg+xml;
    gzip_min_length 1024;

    # Estáticos do Django (inclui o CSS/JS do dj-admin, gerados pelo
    # collectstatic). Servidos direto do disco, sem tocar no app.
    location /static/ {
        alias /CAMINHO/ABSOLUTO/DO/PROJETO/plataforma/staticfiles/;
        access_log off;
        expires 30d;
    }

    # Uploads de mídia (fotos de curso, instrutores, carteirinha...).
    location /media/ {
        alias /CAMINHO/ABSOLUTO/DO/PROJETO/plataforma/media/;
        access_log off;
        expires 7d;
    }

    # API e admin do Django.
    location ~ ^/(api|dj-admin)/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Tudo mais é o Next.js (páginas, assets /_next/, revalidate...).
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # --- TLS (o certbot preenche/gerencia estas linhas) --------------------
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/magmacursosltda.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/magmacursosltda.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# Redireciona http -> https (também mantido pelo certbot).
server {
    if ($host = magmacursosltda.com.br) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name magmacursosltda.com.br;
    return 404;
}
