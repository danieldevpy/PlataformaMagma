# Reverse proxy único (HTTP, sem TLS ainda). Funciona igual acessando pelo
# IP externo da VPS ou pelo domínio, porque só repassa o Host recebido —
# não há server_name fixo. Quando o domínio tiver certificado, adicione um
# server block 443 com ssl_certificate/ssl_certificate_key (ex.: certbot)
# e redirecione 80 -> 443 aqui.
server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 20m;

    location /static/ {
        alias /usr/share/nginx/static/;
        access_log off;
        expires 30d;
    }

    location /media/ {
        alias /usr/share/nginx/media/;
        access_log off;
        expires 7d;
    }

    location ~ ^/(api|dj-admin)/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
